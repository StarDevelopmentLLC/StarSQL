plugins {
    id 'java-library'
    id 'maven-publish'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        url = 'https://www.jitpack.io'
    }
}

publishing {
    publications {
        shadow(MavenPublication) { publication ->
            groupId = 'com.github.StarDevelopmentLLC'
            
            project.shadow.component(publication)
        }
    }
}

group 'com.stardevllc.starsql'
version '1.0.0-alpha.8'

shadowJar {
    exclude('com.google.protobuf')
    dependencies {
        exclude(dependency('com.github.StarDevelopmentLLC:StarLib:1.0.0-alpha.10'))
    }
    archiveClassifier.set("")
    //destinationDirectory = file("${project.rootDir}" + File.separator + "build")
}

jar.finalizedBy(shadowJar)
publishToMavenLocal.dependsOn(shadowJar)

dependencies {
    implementation 'com.github.StarDevelopmentLLC:StarLib:1.0.0-alpha.10'
    api('com.mysql:mysql-connector-j:8.1.0') {
        exclude group: 'com.google.protobuf', module: 'protobuf-java'
    }
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)
tasks.compileJava.dependsOn(clean)