plugins {
    id 'java-library'
    id 'maven-publish'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        url = 'https://www.jitpack.io'
    }
}

publishing {
    publications {
        shadow(MavenPublication) { publication ->
            project.shadow.component(publication)
        }
    }
}

group 'com.github.StarDevelopmentLLC'
version '1.0.0-alpha.15'

shadowJar {
    exclude('com.google.protobuf')
    dependencies {
        exclude(dependency('com.github.StarDevelopmentLLC:observable:0.1.0'))
        exclude(dependency('com.github.StarDevelopmentLLC:registry:0.1.0'))
        exclude(dependency('com.github.StarDevelopmentLLC:helper:0.1.0'))
    }
    archiveClassifier.set("")
    //destinationDirectory = file("${project.rootDir}" + File.separator + "build")
}

dependencies {
    implementation 'com.github.StarDevelopmentLLC:observable:0.1.0'
    implementation 'com.github.StarDevelopmentLLC:registry:0.1.0'
    implementation 'com.github.StarDevelopmentLLC:helper:0.1.0'
    api('com.mysql:mysql-connector-j:8.1.0') {
        exclude group: 'com.google.protobuf', module: 'protobuf-java'
    }
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)
tasks.jar.finalizedBy(shadowJar)
tasks.publishToMavenLocal.dependsOn(shadowJar)
tasks.compileJava.dependsOn(clean)
tasks.build.finalizedBy(publishToMavenLocal)