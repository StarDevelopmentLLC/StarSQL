plugins {
    id 'java-library'
    id 'maven-publish'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories {
    mavenCentral()
    maven {
        url = 'https://www.jitpack.io'
    }
}

publishing {
    publications {
        shadow(org.gradle.api.publish.maven.MavenPublication) { publication ->
            project.shadow.component(publication)
        }
    }
}

group 'com.stardevllc.starsql'
version '1.0.0-alpha.2'

shadowJar {
    archiveBaseName.set("StarSQL-PostgreSQL")
    archiveClassifier.set("")
    //destinationDirectory = file("${project.rootDir}" + File.separator + "build")
}

jar.finalizedBy(shadowJar)

dependencies {
    api project(':common')
    api 'org.postgresql:postgresql:42.6.0'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)